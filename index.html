<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azizbek | 3-Test</title>
</head>
<style>
    div {               
            
        padding: 10px;  
        margin: auto; 
        border-radius: 14px;        
        background-color: rgb(9, 179, 179);
        width: 1000px;
        height: auto;
    }
    .img{
        border-radius: 50%;
        
    }
    h1, p{
        color: white;
    }
    button{
        background-color: white;
        color: black;
        border-radius: 5px;        
        transition: 0.5;
    }
    button:hover{
        background: black;
        color: white;
    }
</style>
<body>
    <div>
        <img class="img"
        src="test-uchun.jpeg" alt="John Doe"><br>     
        <h1>John Doe</h1>
        <p>Frontend Developer</p>
        <p>I love building clean and simple UI using HTML and CSS</p>
        <button>View profile</button>
    </div>
    
</body>
</html>
